<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cute Music Player</title>
    <!-- 메타 태그 추가 -->
    <meta name="description" content="음악 플레이어 애플리케이션">
    <meta name="theme-color" content="#e83e8c">
    
    <!-- 한글 폰트 추가 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- 파비콘 -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎵</text></svg>">
    
    <!-- Font Awesome 아이콘을 비동기적으로 로드 -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"></noscript>
    
    <!-- 스타일시트 -->
    <link rel="stylesheet" href="/css/style.css">
    
    <!-- 인라인 스타일 추가 -->
    <style>
        /* 초기 로딩 화면 스타일 추가 */
        .initial-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
        }
        
        .loading-logo {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: pulse-scale 2s infinite;
        }
        
        .loading-text {
            font-size: 1rem;
            color: #555;
            margin-bottom: 1rem;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(232, 62, 140, 0.2);
            border-top: 4px solid #e83e8c;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-progress {
            width: 200px;
            height: 4px;
            background-color: rgba(0,0,0,0.1);
            border-radius: 2px;
            margin-top: 1rem;
            overflow: hidden;
            position: relative;
        }
        
        .loading-progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background-color: #e83e8c;
            transition: width 0.3s ease;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes pulse-scale {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .render-notice {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(0,0,0,0.7);
            color: white;
            text-align: center;
            padding: 0.5rem;
            font-size: 0.8rem;
            z-index: 100;
        }
        
        .render-notice a {
            color: #e83e8c;
            text-decoration: none;
        }
        
        .render-notice a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- 초기 로딩 화면 -->
    <div class="initial-loading" id="initial-loading">
        <div class="loading-logo">🎵</div>
        <div class="loading-text">뮤직 플레이어 로딩 중...</div>
        <div class="loading-spinner"></div>
        <div class="loading-progress">
            <div class="loading-progress-bar" id="loading-progress-bar"></div>
        </div>
        <p style="margin-top: 1rem; font-size: 0.8rem; color: #777; max-width: 80%; text-align: center;">
            Render 무료 플랜에서는 첫 로딩에 15-30초가 소요될 수 있습니다.
        </p>
    </div>
    
    <!-- 배경 이미지 컨테이너 -->
    <div class="bg-container" id="bg-container"></div>
    
    <div class="container">
        <div class="player-container">
            <!-- Cover art with play button -->
            <div class="song-cover">
                <img id="cover-image" src="https://via.placeholder.com/200?text=Loading..." alt="Song cover" loading="lazy">
                <div class="play-btn" id="cover-play-btn">
                    <i class="fas fa-play"></i>
                </div>
            </div>
            
            <!-- Song info -->
            <div class="song-info">
                <div class="song-title" id="song-title">Loading...</div>
                <div class="song-artist" id="song-artist">Please wait</div>
            </div>
            
            <!-- 재생 진행 바 추가 -->
            <div class="progress-container">
                <div class="time-display current-time">0:00</div>
                <div class="progress-bar">
                    <div class="progress-filled"></div>
                    <div class="progress-handle"></div>
                </div>
                <div class="time-display duration">0:00</div>
            </div>
            
            <!-- Controls -->
            <div class="controls">
                <button class="control-btn" id="replay-btn">
                    <i class="fas fa-redo-alt"></i>
                </button>
                <button class="control-btn play-control" id="play-btn">
                    <i class="fas fa-play"></i>
                </button>
                <button class="control-btn" id="next-btn">
                    <i class="fas fa-step-forward"></i>
                </button>
            </div>
        </div>
        
        <!-- YouTube iframe (hidden) -->
        <div id="youtube-player" class="hidden"></div>
        
        <!-- Playlist section -->
        <div class="playlist">
            <div class="playlist-header">
                <div class="playlist-title">Playlist</div>
                <div class="playlist-controls">
                    <button class="shuffle-btn" id="shuffle-btn">
                        <i class="fas fa-random"></i> Shuffle
                    </button>
                    <button class="add-song-btn" id="show-add-form-btn">
                        <i class="fas fa-plus"></i> Add Song
                    </button>
                    <button class="clear-btn" id="clear-playlist-btn">
                        <i class="fas fa-trash-alt"></i> Clear All
                    </button>
                </div>
            </div>
            
            <!-- Add song form (initially hidden) -->
            <div class="add-song-form hidden" id="add-song-form">
                <form id="add-song-form-element">
                    <div class="form-group">
                        <label class="form-label" for="title">Song Title (한글 지원)</label>
                        <input class="form-input" type="text" id="title" name="title" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="artist">Artist (한글 지원)</label>
                        <input class="form-input" type="text" id="artist" name="artist" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="youtube_url">YouTube URL or Video ID</label>
                        <input class="form-input" type="text" id="youtube_url" name="youtube_url" required
                               placeholder="https://www.youtube.com/watch?v=...">
                    </div>
                    <button class="form-submit" type="submit">Add to Playlist</button>
                </form>
                <div class="cancel-btn">
                    <button id="cancel-add-form-btn">Cancel</button>
                </div>
            </div>
            
            <!-- Playlist items -->
            <div class="playlist-items" id="playlist-container">
                <!-- 자바스크립트로 동적 생성 -->
                <div class="loading">
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        Made with ❤️ just for you
    </div>
    
    <!-- Render 무료 티어 알림 -->
    <div class="render-notice">
        Render 무료 티어는 일정 시간 동안 사용되지 않으면 휴면 모드로 전환됩니다. 첫 접속 시 15-30초가 소요될 수 있습니다.
    </div>

    <!-- 자바스크립트 -->
    <script src="/js/app.js"></script>
    <script>
        // 로딩 진행 표시기 업데이트
        const progressBar = document.getElementById('loading-progress-bar');
        const initialLoading = document.getElementById('initial-loading');
        
        // 로딩 진행률 시뮬레이션
        let progress = 0;
        const loadingInterval = setInterval(() => {
            progress += Math.random() * 3;  // 진행률 랜덤하게 증가
            
            if (progress >= 100) {
                progress = 100;
                clearInterval(loadingInterval);
            }
            
            progressBar.style.width = `${progress}%`;
        }, 300);
        
        // 컨텐츠 로드 완료 되면 로딩 화면 숨기기
        window.addEventListener('load', () => {
            // API 로드가 완료되면 약간의 지연 후 로딩 화면 제거
            setTimeout(() => {
                progressBar.style.width = '100%';
                setTimeout(() => {
                    initialLoading.style.opacity = '0';
                    setTimeout(() => {
                        initialLoading.style.display = 'none';
                    }, 500);
                }, 300);
            }, 1000);
        });
    </script>
</body>
</html>
